<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0B2A6B;
    --navy-mid: #1A4FBF;
    --navy-light: #4A90D9;
    --accent: #00C9A7;
    --text-primary: #0B2A6B;
    --text-muted: #6B85B8;
    --bg: #F0F4FF;
    --white: #ffffff;
    --border: #DDE6F7;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* 背景幾何裝飾 */
  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(26,79,191,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,201,167,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(11,42,107,0.15), 0 4px 16px rgba(11,42,107,0.08);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .card-header {
    background: var(--navy);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }
  .card-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .card-header::after {
    content: '';
    position: absolute;
    bottom: -60px; right: 40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(0,201,167,0.08);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }

  .avatar {
    width: 60px; height: 60px;
    border-radius: 16px;
    background: var(--navy-mid);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 900;
    color: var(--white);
    font-family: 'Noto Sans TC', sans-serif;
    flex-shrink: 0;
    letter-spacing: 0;
  }

  .header-name { flex: 1; }

  .name-zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 6px;
    line-height: 1.1;
  }

  .title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .title-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,201,167,0.18);
    border: 1px solid rgba(0,201,167,0.35);
    color: #00e8c0;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .brand-logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .brand-logo span { color: var(--navy-light); }

  .brand-sep {
    width: 1px; height: 20px;
    background: rgba(255,255,255,0.2);
  }

  .brand-zh {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 2px;
  }

  /* Info Section */
  .info-section {
    padding: 24px 28px 8px;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.4s ease both;
  }
  .info-row:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .info-row:nth-child(1) { animation-delay: 0.1s; }
  .info-row:nth-child(2) { animation-delay: 0.15s; }
  .info-row:nth-child(3) { animation-delay: 0.2s; }
  .info-row:nth-child(4) { animation-delay: 0.25s; }
  .info-row:nth-child(5) { animation-delay: 0.3s; }
  .info-row:nth-child(6) { animation-delay: 0.35s; }

  .info-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: #EEF3FF;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 17px;
  }

  .info-content { flex: 1; }

  .info-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    margin-bottom: 1px;
  }

  .info-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    font-family: 'Noto Sans TC', sans-serif;
  }

  .info-value a {
    color: var(--navy-mid);
    text-decoration: none;
    transition: color 0.2s;
  }
  .info-value a:hover { color: var(--accent); }

  /* QR Section */
  .qr-section {
    margin: 8px 28px 0;
    background: var(--bg);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .qr-img {
    width: 110px; height: 110px;
    border-radius: 10px;
    border: 3px solid var(--navy);
    flex-shrink: 0;
    display: block;
  }

  .qr-text { flex: 1; }

  .qr-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .qr-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* Action buttons */
  .btn-group {
    padding: 20px 28px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    text-decoration: none;
  }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-primary:active { transform: scale(0.98); }

  .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--navy);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }
  .btn-secondary:hover {
    border-color: var(--navy-mid);
    background: #EEF3FF;
  }

  /* Footer */
  .card-footer {
    background: var(--navy);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-slogan {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .footer-url {
    font-size: 11px;
    color: var(--navy-light);
    letter-spacing: 0.5px;
  }
</style>
</head>
